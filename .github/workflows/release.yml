name: Release builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  linux-appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfuse2

      - name: Install package and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dist]"

      - name: Download appimagetool
        run: |
          curl -sSL -o appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/

      - name: Build AppImage
        env:
          PYTHON: python
        run: bash packaging/build-appimage.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: LeatherCAM-Linux-x86_64
          path: dist/LeatherCAM-x86_64.AppImage

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LeatherCAM-x86_64.AppImage

  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dist]"

      - name: Build PyInstaller onedir
        run: python -m PyInstaller --noconfirm packaging/leathercam.spec

      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes

      - name: Compile installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" packaging\leathercam.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: LeatherCAM-Windows-x86_64
          path: packaging/dist/LeatherCAM-Setup-x86_64.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/dist/LeatherCAM-Setup-x86_64.exe
