name: Release builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Opt every JS action into Node.js 24 so the deprecation warning about
# Node 20 goes away. actions/checkout@v4 and actions/setup-python@v5
# both still work fine on Node 24; this just flips their runtime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# softprops/action-gh-release needs write access to the repository's
# Releases. By default GITHUB_TOKEN is read-only for `contents`, which
# is why the upload step failed with HTTP 403.
permissions:
  contents: write

jobs:
  linux-appimage:
    # ubuntu-22.04 still ships libfuse2 in apt; 24.04 dropped it.
    runs-on: ubuntu-22.04
    env:
      # GitHub runners disallow FUSE — tell appimagetool to extract
      # itself and run from a temp dir instead of mounting via FUSE.
      APPIMAGE_EXTRACT_AND_RUN: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfuse2 file desktop-file-utils

      - name: Install package and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dist]"

      - name: Download appimagetool
        run: |
          curl -sSL -o appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/

      - name: Build AppImage
        env:
          # setup-python installs python3 on Linux, not `python`.
          PYTHON: python3
        run: bash packaging/build-appimage.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: LeatherCAM-Linux-x86_64
          path: dist/LeatherCAM-x86_64.AppImage

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LeatherCAM-x86_64.AppImage

  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dist]"

      - name: Build PyInstaller onedir
        run: python -m PyInstaller --noconfirm packaging/leathercam.spec

      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes

      - name: Compile installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" packaging\leathercam.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: LeatherCAM-Windows-x86_64
          path: packaging/dist/LeatherCAM-Setup-x86_64.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/dist/LeatherCAM-Setup-x86_64.exe
